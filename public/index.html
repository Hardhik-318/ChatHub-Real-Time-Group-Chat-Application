<!DOCTYPE html>
<html>
<head>
  <title>Real-time Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f4f6f8;
    }

    /* ---------- Join Screen ---------- */
    #join-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #120f47, #2008a7);
    }
    #join-box {
      background: #fff;
      padding: 40px 36px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }
    #join-box h1 {
      font-size: 26px;
      color: #4f46e5;
      margin-bottom: 4px;
    }
    #join-box p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    #join-box input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    #join-box button {
      width: 100%;
      padding: 11px;
      background: #2008a7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #join-box button:hover { background: #4338ca; }

    /* ---------- Chat Screen ---------- */
    #chat-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      height: 100vh;
    }
    #chat-header {
      background: #161083;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #chat-header .room-info h2 { font-size: 18px; }
    #chat-header .room-info span { font-size: 12px; opacity: 0.85; }
    #exit-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #exit-btn:hover { background: rgba(255,255,255,0.3); }

    #chat-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #user-list {
      width: 180px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 14px;
      overflow-y: auto;
    }
    #user-list h4 {
      font-size: 12px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }
    #user-list ul { list-style: none; }
    #user-list li {
      padding: 6px 0;
      font-size: 14px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #user-list li::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
    }

    #messages-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #log {
      flex: 1;
      list-style: none;
      overflow-y: auto;
      padding: 16px 20px;
    }
    #log li { margin-bottom: 10px; max-width: 70%; }
    .msg-bubble {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      background: #e5e7eb;
      font-size: 14px;
    }
    .msg-user { font-size: 12px; color: #4f46e5; font-weight: 600; margin-bottom: 2px; }
    .system { text-align: center; color: #999; font-size: 12px; font-style: italic; margin: 6px 0; max-width: 100%; }

    #typing-indicator {
      height: 20px;
      padding: 0 20px;
      font-size: 12px;
      color: #888;
      font-style: italic;
    }

    #footer {
      display: flex;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      gap: 10px;
    }
    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    #input:focus { border-color: #4f46e5; }
    #send-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 0 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-btn:hover { background: #4338ca; }
  </style>
</head>
<body>

  <!-- Screen 1: Join -->
  <div id="join-screen">
    <div id="join-box">
      <h1>ChatHub</h1>
      <p>Real-time conversations, made simple.</p>
      <input id="username-input" placeholder="Your name" />
      <input id="room-input" placeholder="Room name" />
      <button onclick="joinRoom()">Enter Room</button>
    </div>
  </div>

  <!-- Screen 2: Chat -->
  <div id="chat-screen">
    <div id="chat-header">
      <div class="room-info">
        <h2 id="room-title">Room</h2>
        <span id="room-sub">Connected</span>
      </div>
      <button id="exit-btn" onclick="exitRoom()">Exit Room</button>
    </div>
    <div id="chat-body">
      <div id="user-list">
        <h4>Online</h4>
        <ul id="users-ul"></ul>
      </div>
      <div id="messages-panel">
        <ul id="log"></ul>
        <div id="typing-indicator"></div>
        <div id="footer">
          <input id="input" placeholder="Type a message..." />
          <button id="send-btn" onclick="send()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let username = "";
    let room = "";
    let typingTimeout;

    function joinRoom() {
      const nameVal = document.getElementById("username-input").value.trim();
      const roomVal = document.getElementById("room-input").value.trim();
      if (!nameVal || !roomVal) {
        alert("Please enter both your name and a room name.");
        return;
      }
      username = nameVal;
      room = roomVal;

      socket.emit("join-room", { username, room });

      document.getElementById("join-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      document.getElementById("room-title").textContent = room;
      document.getElementById("room-sub").textContent = `Joined as ${username}`;
    }

    function exitRoom() {
      socket.disconnect();
      document.getElementById("chat-screen").style.display = "none";
      document.getElementById("join-screen").style.display = "flex";
      document.getElementById("log").innerHTML = "";
      document.getElementById("users-ul").innerHTML = "";
      document.getElementById("username-input").value = "";
      document.getElementById("room-input").value = "";
      socket.connect(); // reconnect fresh for next join
    }

    function send() {
      const input = document.getElementById("input");
      if (input.value.trim() === "") return;
      socket.emit("message", input.value);
      input.value = "";
      socket.emit("stop-typing");
    }

    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { send(); return; }
      socket.emit("typing");
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit("stop-typing"), 1000);
    });

    function appendLine(html, cssClass) {
      const li = document.createElement("li");
      li.innerHTML = html;
      if (cssClass) li.className = cssClass;
      const log = document.getElementById("log");
      log.appendChild(li);
      log.scrollTop = log.scrollHeight;
    }

    socket.on("message", (data) => {
      appendLine(`<div class="msg-user">${data.user}</div><div class="msg-bubble">${data.text}</div>`);
    });

    socket.on("history", (messages) => {
      messages.forEach((m) => {
        appendLine(`<div class="msg-user">${m.user}</div><div class="msg-bubble">${m.text}</div>`);
      });
    });

    socket.on("system", (text) => appendLine(text, "system"));

    socket.on("user-list", (users) => {
      const ul = document.getElementById("users-ul");
      ul.innerHTML = "";
      users.forEach((u) => {
        const li = document.createElement("li");
        li.textContent = u;
        ul.appendChild(li);
      });
    });

    socket.on("typing", (user) => {
      document.getElementById("typing-indicator").textContent = `${user} is typing...`;
    });
    socket.on("stop-typing", () => {
      document.getElementById("typing-indicator").textContent = "";
    });
  </script>
</body>
</html>
